version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: snippet_archive_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: snippet
      POSTGRES_PASSWORD: snippet
      POSTGRES_DB: snippet_archive
    ports:
      - "54329:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
